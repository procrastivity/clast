name: release
# Publishes to npm via Trusted Publishing (OIDC) — no NPM_TOKEN
# secret required. Configure the trusted publisher for
# @procrastivity/clast at https://www.npmjs.com (see
# docs/reference/releasing.md). GITHUB_TOKEN is provided automatically.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Re-run every gate
        run: |
          nix develop -c make lint
          nix develop -c make test
          nix develop -c make check-version-sync
          nix develop -c make npm-pack-check
          nix develop -c make nix-smoke
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(jq -r '.version' package.json)
          if [ "$tag" != "$pkg" ]; then
            echo "tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi
      - name: Build Nix package
        run: nix build .#default --print-build-logs
      - name: Pack npm tarball
        id: pack
        run: |
          tarball=$(npm pack --silent)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - name: Publish to npm
        run: npm publish --provenance --access public "${{ steps.pack.outputs.tarball }}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${{ steps.pack.outputs.tarball }}"
