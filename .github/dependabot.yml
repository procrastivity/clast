version: 2
updates:
  # GitHub Actions used in workflows. clast has no npm runtime/dev
  # dependencies (package.json ships only the CLI), so the npm ecosystem is
  # intentionally omitted — Actions are the only thing to keep current, and
  # bumping them clears the recurring Node-20-runner deprecation warnings.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        # Major updates land as separate PRs (require human review for breaking changes).
