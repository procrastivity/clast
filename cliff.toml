# git-cliff configuration — conventional commits → Keep a Changelog format
# https://git-cliff.org/

[changelog]
header = """
# Changelog

All notable changes to this project will be documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/),
generated via [git-cliff](https://git-cliff.org/).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  # Skip the release commit itself (produced by contrib/release) so a
  # release does not appear in its own changelog body.
  { message = "^release:", skip = true },
  # Skip per-step squash-merge commits from the build history.
  { message = "^step-[0-9]+:", skip = true },
  { message = "^chore", skip = true },
  { message = "^test", skip = true },
  { message = "^refactor", skip = true },
  { message = "^style", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^ci", group = "CI" },
  { message = "^build", group = "Build" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
